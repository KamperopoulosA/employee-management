server:
port: 8085
spring:
  application:
    name: employee-management
  datasource:
    url: jdbc:postgresql://localhost:5432/employee-management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect